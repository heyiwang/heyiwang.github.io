<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>heyiwang.github.io</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          "SF Pro Display",
          "PingFang SC",
          "Hiragino Sans GB",
          "Microsoft YaHei",
          sans-serif;
        background: linear-gradient(180deg, #f6efe4 0%, #eef2f7 100%);
        color: #0f172a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 720px);
        background: rgba(255, 255, 255, 0.82);
        border: 1px solid rgba(148, 163, 184, 0.16);
        border-radius: 28px;
        box-shadow: 0 22px 50px rgba(15, 23, 42, 0.08);
        padding: 32px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 3rem);
        letter-spacing: -0.04em;
      }

      p {
        margin: 0 0 24px;
        color: #475569;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 52px;
        padding: 0 20px;
        border-radius: 999px;
        background: #0f172a;
        color: #fff;
        text-decoration: none;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>heyiwang.github.io</h1>
      <!-- <p>这里是主页入口。小五预约系统已经整理到 GitHub Pages 的子路径下。</p>
      <a href="/xiaowu/">打开小五预约</a> -->
    </main>
  </body>
</html>
